<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <main>
      <section>
        <h2>No flex on the children</h2>
        <div class="flexbox flex-noflex">
          <p>1</p>
          <p>2</p>
          <p>3</p>
        </div>
      </section>
      <section>
        <h2>Equally spaced</h2>
        <div class="flexbox flex">
          <p>1</p>
          <p>2</p>
          <p>3</p>
        </div>
      </section>
      <section>
        <h2>One element bigger</h2>
        <div class="flexbox flex">
          <p class="flex-grow-1">1</p>
          <p>2</p>
          <p>3</p>
        </div>
      </section>
      <section>
        <h2>One element bigger, one even bigger!</h2>
        <div class="flexbox flex">
          <p class="flex-grow-1">1</p>
          <p class="flex-grow-2">2</p>
          <p>3</p>
        </div>
      </section>
    </main>
  </body>
</html>
