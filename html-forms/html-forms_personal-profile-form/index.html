<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Personal Profile Form</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <h1 id="title">Create your Personal Profile</h1>
    <form aria-labelledby="title">
      <p id="personal-information-description">
        We want to get to know you! Please enter your personal information.
      </p>
      <fieldset aria-describedby="personal-information-description">
        <legend>Personal Information</legend>
        <label for="firstname">First Name:</label>
        <input id="firstname" />
        <label for="lastname">Last Name:</label>
        <input id="lastname" />
        <label for="birthday">Your Birthday:</label>
        <input type="date" max="2026-03-23" />
      </fieldset>
      <p id="further-information-description">
        Can you tell us a little bit more? We want to annoy you with unwanted
        ads. >:)
      </p>
      <fieldset aria-describedby="further-information-description">
        <legend>Further Information</legend>
        <label for="favcolor">Favourite Color:</label>
        <input id="favcolor" type="color" value="#E5430F" />
        <label for="favpet">What's your favourite pet?</label>
        <select id="favpet">
          <option value="" disabled selected>
            --Please choose an option--
          </option>
          <option value="Agra Cadabra">Agra Cadabra</option>
          <option value="Chicken Turtle">Chicken Turtle</option>
          <option value="Fried Egg Jellyfish">Fried Egg Jellyfish</option>
        </select>
      </fieldset>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
